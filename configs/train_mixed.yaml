# configs/train_mixed.yaml
# ═══════════════════════════════════════════════════════════════════
# Mixed-domain training: 55% FF++ + 15% Celeb-DF + 15% WildDeepfake + 15% DiffSwap
# This is the #1 improvement for cross-dataset generalization.
# ═══════════════════════════════════════════════════════════════════

seed: 3407
torch_home: ""
froze: false
ckpt_path: null

dataset:
  name: "mixed"
  mixed:
    total_per_epoch: 80000
    domains:
      - name: ffpp_rela
        weight: 0.55
        config_key: ffpp_rela
        split: train
      - name: celeb_df
        weight: 0.15
        config_key: celeb_df_train
        split: train
      - name: wild_deepfake
        weight: 0.15
        config_key: wild_deepfake_train
        split: train
      - name: diffswap
        weight: 0.15
        config_key: diffswap_train
        split: train

val_dataset:
  name: "ffpp_rela"


  # ── Per-domain configs (referenced by config_key above) ──────────

  ffpp_rela:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/ffpp"
    data_types: ""
    compressions: "c23"
    num_frames: 50
    methods: ["youtube", "Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]
    has_mask: false
    balance: true
    relation_data: true
    similarity: false
    similarity_path: null
    use_splits: true
    strict_splits: true
    splits_dirname: "splits"
    csv_dirname: "split_csv2"
    random_patch: null

  # Celeb-DF: use ALL data for training (no official train/test in CSV)
  # Create a train split CSV: take 80% of videos for train, 20% for val
  celeb_df_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/celebdf"
    num_frames: 50
    methods: "both"
    control: true
    alb: true
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/celebdf/split_csv2/celeb_df_v2_train.csv"
    strict_csv: false
    min_frames: 1
    mtcnn_suffix: "-mtcnn"
    image_size: 256
    skip_bad_images: true

  # WildDeepfake train split
  wild_deepfake_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/wild_deepfake"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/wild_deepfake/split_csv2/wilddeepfake_train.csv"
    image_size: 256
    strict_csv: false
    skip_bad_images: true
    methods: "both"

  # DiffSwap train split (take 80% of the full CSV for training)
  diffswap_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/diffswap"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/diffswap/split_csv2/diffswap_train.csv"
    image_size: 256
    strict_csv: false
    skip_bad_images: true
    methods: "both"

  # ── Configs used only for validation (dataset.name=ffpp_rela for val) ──
  # Val still uses FF++ only (consistent with paper protocol)

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std: [0.5, 0.5, 0.5]
  aug:
    enable: true
    jpeg_quality: [30, 100]
    blur_prob: 0.25
    noise_prob: 0.25
    color_jitter_prob: 0.30
    grayscale_prob: 0.08
    random_erasing_prob: 0.15

train:
  epochs: 60
  lr: 2e-5
  weight_decay: 5e-4
  batch_size: 16
  accumulate_grad_batches: 4
  num_workers: 4
  shuffle: true
  drop_last: true
  logger_freq: 5000
  resume_ckpt: auto
  grad_clip_val: 0.5
  scheduler:
    name: onecycle
    interval: step
    onecycle:
      pct_start: 0.08
      div_factor: 25.0
      final_div_factor: 10000.0
      anneal_strategy: cos

val:
  batch_size: 16
  num_workers: 4
  shuffle: false
  drop_last: false
  max_items: null

test:
  batch_size: 1
  num_workers: 2
  shuffle: false
  drop_last: false
  threshold: 0.5
  max_items: null

wandb:
  project: "DFD_3"
  group: "DIMF_v10_mixed"
  save_code: true

experiment:
  root_dir: "experiments"
  name: "fp_celeb_wild_diffswap_1"

model:
  backbone: "convnextv2_base"

checkpoint:
  monitor: "v/eer"
  mode: min
  save_top_k: 3
  save_last: true
  best_filename: "best-eer-epoch={epoch:02d}"
  every_filename: "epoch={epoch:02d}"