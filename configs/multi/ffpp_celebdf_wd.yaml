# configs/multi/ffpp_celebdf_wd.yaml
# ═══════════════════════════════════════════════════════════════════════════
# 3-Domain Mix: FF++ (50%) + CelebDF (25%) + WildDeepfake (25%)
# Validation: FF++ val split
#
# WHY THIS COMBINATION:
#   Adding WildDeepfake brings real in-the-wild diversity that FF++ and
#   CelebDF both lack. The model sees studio, YouTube, and internet-sourced
#   faces during training → stronger generalization to unseen domains.
#
# Expected improvement over 2-domain:
#   WildDeepfake V-AUC 0.803 → ~0.85+ (in-domain)
#   DFD cross-domain remains limited (not in training) — use 5-domain for DFD
#
# Usage:
#   torchrun --nproc_per_node=4 train.py -c configs/train_3domain.yaml
# ═══════════════════════════════════════════════════════════════════════════

seed: 3407
torch_home: ""
froze: false
ckpt_path: null

dataset:
  name: "mixed"

  mixed:
    total_per_epoch: 80000
    domains:
      - name: ffpp_rela
        weight: 0.50
        config_key: ffpp_rela
        split: train

      - name: celeb_df
        weight: 0.25
        config_key: celeb_df_train
        split: train

      - name: wild_deepfake
        weight: 0.25
        config_key: wild_deepfake_train
        split: train

  # ── Domain configs ──────────────────────────────────────────────────────

  ffpp_rela:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/ffpp"
    data_types: ""
    compressions: "c23"
    num_frames: 50
    methods: ["youtube", "Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]
    has_mask: false
    balance: true
    relation_data: true
    similarity: false
    similarity_path: null
    use_splits: true
    strict_splits: true
    splits_dirname: "splits"
    csv_dirname: "split_csv2"
    random_patch: null

  celeb_df_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/celebdf"
    num_frames: 50
    methods: "both"
    control: true
    alb: true
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/celebdf/split_csv2/celeb_df_v2_train.csv"
    strict_csv: false
    min_frames: 1
    mtcnn_suffix: "-mtcnn"
    image_size: 256
    skip_bad_images: true
    sbi_prob: 0.40
    freq_aug_prob: 0.25
    use_sbi: true

  wild_deepfake_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/wild_deepfake"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/wild_deepfake/split_csv2/wilddeepfake_train.csv"
    image_size: 256
    strict_csv: false
    skip_bad_images: true
    methods: "both"

val_dataset:
  name: "ffpp_rela"

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std:  [0.5, 0.5, 0.5]
  aug:
    enable: true
    jpeg_quality:        [30, 100]
    blur_prob:           0.25
    noise_prob:          0.25
    color_jitter_prob:   0.30
    grayscale_prob:      0.08
    random_erasing_prob: 0.15

train:
  epochs: 60
  lr: 1.5e-5
  weight_decay: 5e-4
  batch_size: 32
  accumulate_grad_batches: 4
  num_workers: 4
  shuffle: true
  drop_last: true
  logger_freq: 5000
  resume_ckpt: auto
  grad_clip_val: 0.5
  head_lr_mult: 1.2
  scheduler:
    name: onecycle
    interval: step
    onecycle:
      pct_start: 0.08
      div_factor: 25.0
      final_div_factor: 10000.0
      anneal_strategy: cos

logit_saturation_monitor:
  collapse_thr:        0.95
  lambda_rescue:       0.30
  lambda_target:       1.00
  restore_epochs:      4
  label_smooth_start:  0.08
  label_smooth_end:    0.05
  label_smooth_warmup: 4

early_stopping:
  monitor:   "v/eer"
  mode:      "min"
  patience:  12
  min_delta: 0.0005

val:
  batch_size: 64
  num_workers: 4
  shuffle: false
  drop_last: false
  max_items: null

test:
  batch_size: 1
  num_workers: 2
  shuffle: false
  drop_last: false
  threshold: 0.5
  max_items: null

wandb:
  project: "DFD_3"
  group:   "Mix3_FFpp_Celeb_Wild"
  save_code: true

experiment:
  root_dir: "experiments"
  name: "FFpp_Celeb_Wild_2"

model:
  backbone: "convnextv2_base"

checkpoint:
  monitor:          "v/eer"
  mode:             min
  save_top_k:       3
  save_last:        true
  best_filename:    "best-eer-epoch={epoch:02d}"
  every_filename:   "epoch={epoch:02d}"
  # save_every_n_epochs: 5
  save_epochs: []