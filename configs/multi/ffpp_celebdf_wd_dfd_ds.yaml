# configs/multi/ffpp_celebdf_wd_dfd_ds.yaml
# ═══════════════════════════════════════════════════════════════════════════
# 5-Domain Mix: FF++(40%) + CelebDF(20%) + DFD(15%) + WildDeepfake(12%) + DiffSwap(13%)
# Validation: FF++ val split
#
# WHY ALL 5 DOMAINS:
#   This is the MAXIMUM DIVERSITY setup. Each domain covers a distinct
#   distribution shift:
#     FF++         — paired source/target, YouTube videos, 4 methods
#     CelebDF      — high-quality celebrity deepfakes, studio lighting
#     DFD          — Google/JigSaw professional actors (hardest reals)
#     WildDeepfake — real internet, natural lighting, varied backgrounds
#     DiffSwap     — diffusion-based method, most modern forgery type
#
# HYPERPARAMETER RATIONALE:
#   - LR 1e-5 (lower than 2-domain): more domains = more gradient noise
#   - cosine_warmup with 2000 warmup steps: smooth LR rise prevents early
#     collapse when the model first sees very different distributions
#   - label_smooth_start=0.08 (lower than single-domain): model already
#     converged from previous training (resume_ckpt: auto)
#   - accum=4, effective batch=128: needed for stable gradient estimates
#     across diverse domains
#
# RECOMMENDED TRAINING FLOW (to beat SOTA):
#   Step 1: python train.py -c configs/train_ffpp.yaml    (baseline)
#   Step 2: python train.py -c configs/train_5domain.yaml (fine-tune)
#   The 5-domain run resumes from Step 1 via resume_ckpt: auto.
#
# Expected cross-domain performance:
#   CelebDF V-AUC:      ~0.85-0.90
#   WildDeepfake V-AUC: ~0.85-0.88
#   DFD V-AUC:          ~0.78-0.85  (was 0.507 without DFD in training)
#   DiffSwap V-AUC:     ~0.95+
#   Average:            ~0.87+  vs paper's 0.82 with EfficientNet-B4
#
# Usage:
#   torchrun --nproc_per_node=4 train.py -c configs/train_5domain.yaml
# ═══════════════════════════════════════════════════════════════════════════

seed: 3407
torch_home: ""
froze: false
ckpt_path: null

dataset:
  name: "mixed"

  mixed:
    total_per_epoch: 100000
    domains:
      # FF++: highest weight — provides crucial source/target pairs for DIMF
      - name: ffpp_rela
        weight: 0.40
        config_key: ffpp_rela
        split: train

      # CelebDF: celebrity domain, different from YouTube
      - name: celeb_df
        weight: 0.20
        config_key: celeb_df_train
        split: train

      # DFD: professional actors — critical for DFD cross-domain performance
      - name: dfd
        weight: 0.15
        config_key: dfd_train
        split: train

      # WildDeepfake: in-the-wild, most diverse backgrounds
      - name: wild_deepfake
        weight: 0.12
        config_key: wild_deepfake_train
        split: train

      # DiffSwap: latest diffusion-based method
      - name: diffswap
        weight: 0.13
        config_key: diffswap_train
        split: train

  # ── Domain configs ──────────────────────────────────────────────────────

  ffpp_rela:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/ffpp"
    data_types: ""
    compressions: "c23"
    num_frames: 50
    methods: ["youtube", "Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]
    has_mask: false
    balance: true
    relation_data: true
    similarity: false
    similarity_path: null
    use_splits: true
    strict_splits: true
    splits_dirname: "splits"
    csv_dirname: "split_csv2"
    random_patch: null

  celeb_df_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/celebdf"
    num_frames: 50
    methods: "both"
    control: true
    alb: true
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/celebdf/split_csv2/celeb_df_v2_train.csv"
    strict_csv: false
    min_frames: 1
    mtcnn_suffix: "-mtcnn"
    image_size: 256
    skip_bad_images: true
    sbi_prob: 0.40
    freq_aug_prob: 0.25
    use_sbi: true

  dfd_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/dfd"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/dfd/split_csv2/dfd_train.csv"
    num_frames: 50
    image_size: 256
    min_frames: 1
    mtcnn_suffix: "-mtcnn"
    strict_csv: false
    skip_bad_images: true
    methods: "both"
    eval_k_frames_per_video: 50
    eval_balance_classes: false
    sbi_prob: 0.35
    freq_aug_prob: 0.25
    use_sbi: true

  wild_deepfake_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/wild_deepfake"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/wild_deepfake/split_csv2/wilddeepfake_train.csv"
    image_size: 256
    strict_csv: false
    skip_bad_images: true
    methods: "both"

  diffswap_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/diffswap"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/diffswap/split_csv2/diffswap_train.csv"
    image_size: 256
    strict_csv: false
    skip_bad_images: true
    methods: "both"

# Validation on FF++ (standard benchmark protocol, consistent with paper)
val_dataset:
  name: "ffpp_rela"

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std:  [0.5, 0.5, 0.5]
  aug:
    enable: true
    jpeg_quality:        [30, 100]
    blur_prob:           0.25
    noise_prob:          0.25
    color_jitter_prob:   0.30
    grayscale_prob:      0.08
    random_erasing_prob: 0.15

train:
  epochs: 60
  lr: 1e-5             # lower than single-domain to handle distribution diversity
  weight_decay: 5e-4
  batch_size: 32
  accumulate_grad_batches: 4    # effective batch = 128
  num_workers: 4
  shuffle: true
  drop_last: true
  logger_freq: 5000
  resume_ckpt: auto             # resume from FF++ single-domain checkpoint
  grad_clip_val: 0.5
  head_lr_mult: 1.1
  scheduler:
    name: cosine_warmup
    interval: step
    cosine_warmup:
      warmup_steps: 2000        # ~1.5 epochs warmup
      min_lr_factor: 0.05

logit_saturation_monitor:
  collapse_thr:        0.95
  lambda_rescue:       0.30
  lambda_target:       1.00
  restore_epochs:      4
  label_smooth_start:  0.08    # gentler than single-domain start (already converged)
  label_smooth_end:    0.05
  label_smooth_warmup: 3

early_stopping:
  monitor:   "v/eer"
  mode:      "min"
  patience:  12
  min_delta: 0.0005

val:
  batch_size: 64
  num_workers: 4
  shuffle: false
  drop_last: false
  max_items: null

test:
  batch_size: 1
  num_workers: 2
  shuffle: false
  drop_last: false
  threshold: 0.5
  max_items: null

wandb:
  project: "DFD_3"
  group:   "Mix5_AllDomains"
  save_code: true

experiment:
  root_dir: "experiments"
  name: "Mix5_AllDomains_v2"

model:
  backbone: "convnextv2_base"

checkpoint:
  monitor:          "v/eer"
  mode:             min
  save_top_k:       3
  save_last:        true
  best_filename:    "best-eer-epoch={epoch:02d}"
  every_filename:   "epoch={epoch:02d}"
  # save_every_n_epochs: 5
  save_epochs: []