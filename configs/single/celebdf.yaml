# configs/single/celebdf.yaml
# ═══════════════════════════════════════════════════════════════════════════
# Single-domain: Train on CelebDF-v2 only.
# CelebDF has no genuine source/target identity pairs (no paired videos),
# so DIMF runs in twin mode (source = target = hint). This is fine —
# the architecture adapts automatically.
#
# Key tuning vs FF++:
#   - Lower LR (5e-6): CelebDF is smaller and more homogeneous than FF++.
#     Higher LR causes fast logit saturation (eer_thr → 0.99).
#   - cosine_warmup scheduler: plateau was too aggressive on CelebDF.
#   - Smaller accum (2): more frequent updates at lower LR = smoother signal.
#   - Tighter grad clip (0.3): prevents BCE spikes that cause collapse.
#
# Usage:
#   python train.py -c configs/train_celebdf.yaml
# ═══════════════════════════════════════════════════════════════════════════

seed: 3407
torch_home: ""
froze: false
ckpt_path: null

dataset:
  name: "celeb_df"

  celeb_df:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/celebdf"
    num_frames: 50
    methods: "both"
    control: true
    alb: true
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/celebdf/split_csv2/celeb_df_v2_train.csv"
    strict_csv: false
    min_frames: 1
    mtcnn_suffix: "-mtcnn"
    image_size: 256
    skip_bad_images: true
    sbi_prob: 0.40        # SBI on real frames — creates synthetic blending boundaries
    freq_aug_prob: 0.25   # frequency perturbation
    use_sbi: true

# Validation uses the CelebDF val split (different CSV from train)
val_dataset:
  name: "celeb_df"
  celeb_df:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/celebdf"
    num_frames: 50
    methods: "both"
    control: true
    alb: true
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/celebdf/split_csv2/celeb_df_v2_val.csv"
    strict_csv: false
    min_frames: 1
    mtcnn_suffix: "-mtcnn"
    image_size: 256
    skip_bad_images: true
    sbi_prob: 0.0         # no SBI on val
    freq_aug_prob: 0.0
    use_sbi: false

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std:  [0.5, 0.5, 0.5]
  aug:
    enable: true
    jpeg_quality:        [30, 100]
    blur_prob:           0.25
    noise_prob:          0.25
    color_jitter_prob:   0.30
    grayscale_prob:      0.08
    random_erasing_prob: 0.15

train:
  epochs: 60
  lr: 5e-6               # lower than FF++ to prevent saturation on single-domain
  weight_decay: 5e-4
  batch_size: 32
  accumulate_grad_batches: 2   # more frequent updates
  num_workers: 4
  shuffle: true
  drop_last: true
  logger_freq: 2000
  resume_ckpt: auto
  grad_clip_val: 0.3          # tighter clip for CelebDF
  head_lr_mult: 1.1
  scheduler:
    name: cosine_warmup
    interval: step
    cosine_warmup:
      warmup_steps: 1000      # ~2 epochs at bs=32, accum=2
      min_lr_factor: 0.05

logit_saturation_monitor:
  collapse_thr:        0.95
  lambda_rescue:       0.30
  lambda_target:       1.00
  restore_epochs:      4
  label_smooth_start:  0.10
  label_smooth_end:    0.05
  label_smooth_warmup: 5

early_stopping:
  monitor:   "v/eer"
  mode:      "min"
  patience:  15             # more patience needed at lower LR
  min_delta: 0.0005

val:
  batch_size: 32
  num_workers: 4
  shuffle: false
  drop_last: false
  max_items: null

test:
  batch_size: 1
  num_workers: 2
  shuffle: false
  drop_last: false
  threshold: 0.5
  max_items: null

wandb:
  project: "DFD_3"
  group:   "CelebDF_single"
  save_code: true

experiment:
  root_dir: "experiments"
  name: "CelebDF_3"

model:
  backbone: "convnextv2_base"

checkpoint:
  monitor:          "v/eer"
  mode:             min
  save_top_k:       3
  save_last:        true
  best_filename:    "best-eer-epoch={epoch:02d}"
  every_filename:   "epoch={epoch:02d}"
  # save_every_n_epochs: 5
  save_epochs: []