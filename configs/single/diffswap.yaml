# configs/train_diffswap.yaml
# ═══════════════════════════════════════════════════════════════════════════
# Single-domain: Train on DiffSwap.
#
# DiffSwap specifics:
#   - 30,000 high-quality diffusion-based face swaps on MM-Celeb-A
#   - Most challenging dataset for detection (diffusion method, near-perfect)
#   - No temporal information (image-level dataset)
#   - No source/target pairs → DIMF twin mode
#
# Usage:
#   python train.py -c configs/train_diffswap.yaml
# ═══════════════════════════════════════════════════════════════════════════

seed: 3407
torch_home: ""
froze: false
ckpt_path: null

dataset:
  name: "diffswap"

  diffswap:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/diffswap"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/diffswap/split_csv2/diffswap_train.csv"
    image_size: 256
    strict_csv: false
    skip_bad_images: true
    methods: "both"

val_dataset:
  name: "diffswap"
  diffswap:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/diffswap"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/diffswap/split_csv2/diffswap_val.csv"
    image_size: 256
    strict_csv: false
    skip_bad_images: true
    methods: "both"

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std:  [0.5, 0.5, 0.5]
  aug:
    enable: true
    jpeg_quality:        [30, 100]
    blur_prob:           0.20
    noise_prob:          0.20
    color_jitter_prob:   0.25
    grayscale_prob:      0.05
    random_erasing_prob: 0.10

train:
  epochs: 60
  lr: 1e-5
  weight_decay: 5e-4
  batch_size: 32
  accumulate_grad_batches: 4
  num_workers: 4
  shuffle: true
  drop_last: true
  logger_freq: 2000
  resume_ckpt: auto
  grad_clip_val: 0.5
  head_lr_mult: 1.1
  scheduler:
    name: cosine_warmup
    interval: step
    cosine_warmup:
      warmup_steps: 1000
      min_lr_factor: 0.05

logit_saturation_monitor:
  collapse_thr:        0.95
  lambda_rescue:       0.30
  lambda_target:       1.00
  restore_epochs:      4
  label_smooth_start:  0.10
  label_smooth_end:    0.05
  label_smooth_warmup: 5

early_stopping:
  monitor:   "v/eer"
  mode:      "min"
  patience:  12
  min_delta: 0.0005

val:
  batch_size: 64
  num_workers: 4
  shuffle: false
  drop_last: false
  max_items: null

test:
  batch_size: 1
  num_workers: 2
  shuffle: false
  drop_last: false
  threshold: 0.5
  max_items: null

wandb:
  project: "DFD_3"
  group:   "DiffSwap_single"
  save_code: true

experiment:
  root_dir: "experiments"
  name: "DiffSwap_v1"

model:
  backbone: "convnextv2_base"

checkpoint:
  monitor:          "v/eer"
  mode:             min
  save_top_k:       3
  save_last:        true
  best_filename:    "best-eer-epoch={epoch:02d}"
  every_filename:   "epoch={epoch:02d}"
  save_every_n_epochs: 5
  save_epochs: []