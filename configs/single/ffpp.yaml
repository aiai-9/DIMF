
# configs/single/ffpp.yaml
# ═══════════════════════════════════════════════════════════════════════════
# Paper-aligned setup: Train on FF++ (HQ, c23) only.
# Cross-domain generalization evaluated via eval_generalization.py.
#
# This is the STRONGEST single-domain setup for cross-domain generalization.
# The paper (Table 1) achieves CelebDF AUC=83.17% training on FF++ only.
# The architecture itself (diffusion reverse process) provides generalization.
#
# Validation: FF++ val split (monitors training health, not generalization)
#
# Usage:
#   python train.py -c configs/train_ffpp.yaml
#   torchrun --nproc_per_node=4 train.py -c configs/train_ffpp.yaml
# ═══════════════════════════════════════════════════════════════════════════

seed: 3407
torch_home: ""
froze: false
ckpt_path: null

dataset:
  name: "ffpp_rela"

  ffpp_rela:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/ffpp"
    data_types: ""
    compressions: "c23"
    num_frames: 50
    methods: ["youtube", "Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]
    has_mask: false
    balance: true
    relation_data: true       # enables source/target identity pairs for DIMF
    similarity: false
    similarity_path: null
    use_splits: true
    strict_splits: true
    splits_dirname: "splits"
    csv_dirname: "split_csv2"
    random_patch: null

# FF++ has its own train/val split — no need for a separate val config.
# FaceForensicsRelation uses split='val' automatically via splits_dirname.
# val_dataset block is intentionally omitted here.

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std:  [0.5, 0.5, 0.5]
  aug:
    enable: true
    jpeg_quality:        [30, 100]   # simulates real-world compression
    blur_prob:           0.25
    noise_prob:          0.25
    color_jitter_prob:   0.30
    grayscale_prob:      0.08
    random_erasing_prob: 0.15

train:
  epochs: 80
  lr: 2e-5
  weight_decay: 5e-4
  batch_size: 32
  accumulate_grad_batches: 4       # effective batch = 128
  num_workers: 4
  shuffle: true
  drop_last: true
  logger_freq: 10000
  resume_ckpt: auto
  grad_clip_val: 0.5
  head_lr_mult: 1.2                # MambaHead/scales get slightly higher LR
  scheduler:
    name: onecycle
    interval: step
    onecycle:
      pct_start: 0.08              # 8% warmup ≈ first 6 epochs
      div_factor: 25.0             # start_lr = 2e-5 / 25 = 8e-7
      final_div_factor: 10000.0   # end_lr ≈ 2e-9
      anneal_strategy: cos

logit_saturation_monitor:
  collapse_thr:        0.95
  lambda_rescue:       0.30
  lambda_target:       1.00
  restore_epochs:      4
  label_smooth_start:  0.10
  label_smooth_end:    0.05
  label_smooth_warmup: 5

early_stopping:
  monitor:   "v/eer"
  mode:      "min"
  patience:  12
  min_delta: 0.0005

val:
  batch_size: 64
  num_workers: 4
  shuffle: false
  drop_last: false
  max_items: null

test:
  batch_size: 1
  num_workers: 2
  shuffle: false
  drop_last: false
  threshold: 0.5
  max_items: null

wandb:
  project: "DFD_3"
  group:   "FFpp_single"
  save_code: true

experiment:
  root_dir: "experiments"
  name: "FFpp_3"

model:
  backbone: "convnextv2_base"

checkpoint:
  monitor:          "v/eer"
  mode:             min
  save_top_k:       3
  save_last:        true
  best_filename:    "best-eer-epoch={epoch:02d}"
  every_filename:   "epoch={epoch:02d}"
  # save_every_n_epochs: 5
  save_epochs: []