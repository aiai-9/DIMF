# configs/train_all_domains.yaml
# ═══════════════════════════════════════════════════════════════════════════
# 5-Domain Mixed Training: FF++ + CelebDF + DFD + WildDeepfake + DiffSwap
#
# WHY THIS CONFIG IS THE PRIMARY FIX FOR DFD:
#
# The current FFpp_CelebDF_v1 checkpoint was trained on ONLY FF++ + CelebDF.
# DFD was NEVER seen during training. The model outputs near-0 probability
# for all DFD frames (real and fake alike) because the DFD domain is
# completely out-of-distribution.
#
# Evidence from eval:
#   DFD fake_mean=0.077, real_mean=0.073 -> both nearly zero -> AUC=0.507
#   Compare: FFPP fake_mean=0.968 -> model knows FFPP fakes well
#
# The original DiffusionFake paper (Table 1) achieves DFD AUC=91.71 by
# training ONLY on FF++, which works because:
#   - FF++ and DFD both come from YouTube/similar sources
#   - FF++ includes all 4 methods including Deepfakes (same as DFD fakes)
#   - The paper uses EfficientNet-B4 which learns more compact features
#
# Our ConvNeXt-V2 backbone is more powerful but needs DFD in training to
# learn its specific domain characteristics.
#
# TRAINING DOMAIN WEIGHTS (justified):
#   FF++:         40% — core training set, paired source/target available
#                        rich in all 4 forgery methods
#   CelebDF:      20% — different compression and real/fake style
#   DFD:          15% — HIGH QUALITY fakes, professional actors
#                        most important addition for DFD generalization
#   WildDeepfake: 12% — in-the-wild real-world videos
#   DiffSwap:     13% — diffusion-based face swap (latest method)
#
# EXPECTED IMPROVEMENT:
#   DFD: AUC 0.507 -> ~0.75-0.85 (domain seen during training)
#   Others: maintain or improve (more diverse training)
#   Cross-domain AVG: 0.808 -> ~0.85+
# ═══════════════════════════════════════════════════════════════════════════

seed: 3407
torch_home: ""
froze: false
ckpt_path: null

dataset:
  name: "mixed"

  mixed:
    total_per_epoch: 80000
    domains:
      - name: ffpp_rela
        weight: 0.40
        config_key: ffpp_rela
        split: train

      - name: celeb_df
        weight: 0.20
        config_key: celeb_df_train
        split: train

      # KEY FIX: DFD added to training
      # DFD contains high-quality Google/JigSaw deepfakes of professional actors.
      # Without this, the model scores all DFD frames (real + fake) near zero.
      - name: dfd
        weight: 0.15
        config_key: dfd_train
        split: train

      - name: wild_deepfake
        weight: 0.12
        config_key: wild_deepfake_train
        split: train

      - name: diffswap
        weight: 0.13
        config_key: diffswap_train
        split: train

  # ── FF++ (with relation data for dual identity) ──────────────────────────
  ffpp_rela:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/ffpp"
    data_types: ""
    compressions: "c23"
    num_frames: 50
    methods: ["youtube", "Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]
    has_mask: false
    balance: true
    relation_data: true
    similarity: false
    similarity_path: null
    use_splits: true
    strict_splits: true
    splits_dirname: "splits"
    csv_dirname: "split_csv2"
    random_patch: null

  # ── CelebDF ──────────────────────────────────────────────────────────────
  celeb_df_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/celebdf"
    num_frames: 50
    methods: "both"
    control: true
    alb: true
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/celebdf/split_csv2/celeb_df_v2_train.csv"
    strict_csv: false
    min_frames: 1
    mtcnn_suffix: "-mtcnn"
    image_size: 256
    skip_bad_images: true
    sbi_prob: 0.40
    freq_aug_prob: 0.25
    use_sbi: true

  # ── DFD (KEY NEW ADDITION) ────────────────────────────────────────────────
  # Expects: /scratch/.../dfd/split_csv2/dfd_train.csv
  # Generated by: python scripts/build_all_splits.py
  dfd_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/dfd"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/dfd/split_csv2/dfd_train.csv"
    num_frames: 50
    image_size: 256
    min_frames: 1
    mtcnn_suffix: "-mtcnn"
    strict_csv: false
    skip_bad_images: true
    methods: "both"
    eval_k_frames_per_video: 50
    eval_balance_classes: false
    # SBI augmentation on DFD training reals — teaches model blending boundaries
    # that are domain-invariant and not specific to FF++ style artifacts
    sbi_prob: 0.35
    freq_aug_prob: 0.25
    use_sbi: true

  # ── WildDeepfake ─────────────────────────────────────────────────────────
  wild_deepfake_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/wild_deepfake"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/wild_deepfake/split_csv2/wilddeepfake_train.csv"
    image_size: 256
    strict_csv: false
    skip_bad_images: true
    methods: "both"

  # ── DiffSwap ──────────────────────────────────────────────────────────────
  diffswap_train:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/diffswap"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/diffswap/split_csv2/diffswap_train.csv"
    image_size: 256
    strict_csv: false
    skip_bad_images: true
    methods: "both"

# ── Validation: use FF++ val split ─────────────────────────────────────────
# FF++ is the standard validation set. EER on FF++ tracks training health.
val_dataset:
  name: "ffpp_rela"
  ffpp_rela:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/ffpp"
    data_types: ""
    compressions: "c23"
    num_frames: 50
    methods: ["youtube", "Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]
    has_mask: false
    balance: false
    relation_data: true
    similarity: false
    similarity_path: null
    use_splits: true
    strict_splits: true
    splits_dirname: "splits"
    csv_dirname: "split_csv2"
    random_patch: null

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std:  [0.5, 0.5, 0.5]
  aug:
    enable: true
    jpeg_quality: [30, 100]
    blur_prob: 0.25
    noise_prob: 0.25
    color_jitter_prob: 0.30
    grayscale_prob: 0.08
    random_erasing_prob: 0.15

train:
  epochs: 60
  # Slightly lower LR than FFpp_CelebDF_v1 (2e-5) because we're fine-tuning
  # from that checkpoint into a broader domain mix.
  lr: 1e-5
  weight_decay: 5e-4
  batch_size: 32
  accumulate_grad_batches: 4
  num_workers: 4
  shuffle: true
  drop_last: true
  logger_freq: 20000
  # Start from the best FFpp_CelebDF checkpoint
  # Change this to the actual path of your best checkpoint
  resume_ckpt: auto
  grad_clip_val: 0.5
  head_lr_mult: 1.1
  scheduler:
    name: cosine_warmup
    interval: step
    cosine_warmup:
      warmup_steps: 2000    # ~1.5 epochs warmup before full LR
      min_lr_factor: 0.05

logit_saturation_monitor:
  collapse_thr: 0.95
  lambda_rescue: 0.3
  lambda_target: 1.0
  restore_epochs: 4
  label_smooth_start: 0.08  # less smoothing than fresh start (already converged)
  label_smooth_end: 0.05
  label_smooth_warmup: 3

early_stopping:
  monitor: "v/eer"
  mode: "min"
  patience: 12
  min_delta: 0.005

val:
  batch_size: 64
  num_workers: 4
  shuffle: false
  drop_last: false
  max_items: null

test:
  batch_size: 1
  num_workers: 2
  shuffle: false
  drop_last: false
  threshold: 0.5
  max_items: null

wandb:
  project: "DFD_3"
  group: "AllDomains_1"
  save_code: true

experiment:
  root_dir: "experiments"
  name: "AllDomains_1"    # New run — 5-domain mixed training with DFD

model:
  backbone: "convnextv2_base"

checkpoint:
  monitor: "v/eer"
  mode: min
  save_top_k: 3
  save_last: true
  best_filename: "best-eer-epoch={epoch:02d}"
  every_filename: "epoch={epoch:02d}"