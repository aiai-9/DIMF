# configs/train.yaml
seed: 3407
torch_home: ""
froze: false
ckpt_path: null

dataset:
  name: "ffpp_rela"
  ffpp_rela:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/ffpp"
    data_types: ""
    compressions: "c23"
    num_frames: 50
    methods: ["youtube", "Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]
    has_mask: false
    balance: true
    relation_data: true
    similarity: false
    similarity_path: null
    use_splits: true
    strict_splits: true
    splits_dirname: "splits"
    csv_dirname: "split_csv"
    random_patch: null

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std: [0.5, 0.5, 0.5]
  aug:
    enable: true
    jpeg_quality: [30, 100]
    blur_prob: 0.25
    noise_prob: 0.25
    color_jitter_prob: 0.30
    grayscale_prob: 0.08
    random_erasing_prob: 0.15

train:
  epochs: 80
  lr: 2e-5
  weight_decay: 5e-4
  batch_size: 32
  accumulate_grad_batches: 4
  num_workers: 4
  shuffle: true
  drop_last: true
  logger_freq: 5000
  resume_ckpt: auto    # set to 'null' for fresh start after architecture changes
  grad_clip_val: 0.5
  scheduler:
    name: onecycle
    interval: step
    onecycle:
      pct_start: 0.08         # 8% warmup (~first 4 epochs of 80)
      div_factor: 25.0         # start_lr = max_lr / 25 = 8e-7
      final_div_factor: 10000.0  # end_lr = max_lr / (25*10000) = 8e-11
      anneal_strategy: cos

val:
  batch_size: 32
  num_workers: 4
  shuffle: false
  drop_last: false
  max_items: null

test:
  batch_size: 1
  num_workers: 2
  shuffle: false
  drop_last: false
  threshold: 0.5
  max_items: null

wandb:
  project: "DFD_3"
  group: "DIMF_v9_sbi"
  save_code: true

experiment:
  root_dir: "experiments"
  name: "ConNx_9"     # Fresh start with SBI augmentation + dual-branch gating

model:
  backbone: "convnextv2_base"   # options:
                                # tf_efficientnet_b4_ns
                                # convnextv2_base
                                # convnextv2_large

checkpoint:
  monitor: "v/eer"
  mode: min
  save_top_k: 3
  save_last: true
  best_filename: "best-eer-epoch={epoch:02d}"
  every_filename: "epoch={epoch:02d}"