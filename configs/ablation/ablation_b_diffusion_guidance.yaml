# Ablation B: diffusion guidance

# =============================================================================
# Ablation (b): Backbone + linear head + Diffusion guidance (training-only †)
# Adds the Stable-Diffusion reconstruction loss on top of (a).
# Still no dual upsampling, no FeatureFilters, no Mamba head, no SBI.
# =============================================================================

seed: 3407
torch_home: ""
froze: false
ckpt_path: null

ablation:
  use_diffusion_loss: true     # (b) ✓ diffusion reconstruction loss enabled
  use_dual_upsample:  false    # (b) no dual upsampling + FeatureFilters
  use_mamba_head:     false    # (b) bare linear head (self.fc)
  use_global_smc:     false    # (b) no GlobalHead + SMC
  use_dimf:           false    # (b) no DIMF
  use_igl:            false    # (b) no IGL
  use_gap_loss:       false    # (b) no gap loss
  dual_drop_prob:     0.0

dataset:
  name: "ffpp_rela"
  ffpp_rela:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/ffpp"
    data_types: ""
    compressions: "c23"
    num_frames: 50
    methods: ["youtube", "Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]
    has_mask: false
    balance: true
    relation_data: false       # (b) pairs not needed yet
    similarity: false
    similarity_path: null
    use_splits: true
    strict_splits: true
    splits_dirname: "splits"
    csv_dirname: "split_csv"
    random_patch: null

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std:  [0.5, 0.5, 0.5]
  aug:
    enable: false              # (b) still no SBI / augmentation
    jpeg_quality: [30, 100]
    blur_prob: 0.0
    noise_prob: 0.0
    color_jitter_prob: 0.0
    grayscale_prob: 0.0
    random_erasing_prob: 0.0

train:
  epochs: 10
  lr: 2e-5
  weight_decay: 5e-4
  batch_size: 32
  accumulate_grad_batches: 4
  num_workers: 4
  shuffle: true
  drop_last: true
  logger_freq: 5000
  resume_ckpt: null
  grad_clip_val: 0.5
  scheduler:
    name: onecycle
    interval: step
    onecycle:
      pct_start: 0.08
      div_factor: 25.0
      final_div_factor: 10000.0
      anneal_strategy: cos

val:
  batch_size: 32
  num_workers: 4
  shuffle: false
  drop_last: false
  max_items: null

test:
  batch_size: 1
  num_workers: 2
  shuffle: false
  drop_last: false
  threshold: 0.5
  max_items: null

wandb:
  project: "DFD_ablation"
  group: "ablation_study"
  save_code: true

experiment:
  root_dir: "experiments/ablation"
  name: "b_diffusion_guidance"

model:
  backbone: "convnextv2_base"

checkpoint:
  monitor: "v/eer"
  mode: min
  save_top_k: 2
  save_last: true
  best_filename: "best-eer-epoch={epoch:02d}"
  every_filename: "epoch={epoch:02d}"