# Ablation H: no sbi
# =============================================================================
# Ablation (h): Full model w/o SBI augmentation
# Everything enabled. The only difference from Full is aug.enable=false,
# which disables Self-Blended Images augmentation on real training samples.
# =============================================================================

seed: 3407
torch_home: ""
froze: false
ckpt_path: null

ablation:
  use_diffusion_loss: true
  use_dual_upsample:  true
  use_mamba_head:     true
  use_global_smc:     true
  use_dimf:           true
  use_igl:            true
  use_gap_loss:       true
  dual_drop_prob:     0.3      # (h) dual dropout ON (same as Full)

dataset:
  name: "ffpp_rela"
  ffpp_rela:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/ffpp"
    data_types: ""
    compressions: "c23"
    num_frames: 50
    methods: ["youtube", "Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]
    has_mask: false
    balance: true
    relation_data: true
    similarity: false
    similarity_path: null
    use_splits: true
    strict_splits: true
    splits_dirname: "splits"
    csv_dirname: "split_csv"
    random_patch: null

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std:  [0.5, 0.5, 0.5]
  aug:
    enable: false              # (h) ✗ SBI augmentation DISABLED — ablates this choice
    jpeg_quality: [30, 100]
    blur_prob: 0.0
    noise_prob: 0.0
    color_jitter_prob: 0.0
    grayscale_prob: 0.0
    random_erasing_prob: 0.0

train:
  epochs: 10
  lr: 2e-5
  weight_decay: 5e-4
  batch_size: 32
  accumulate_grad_batches: 4
  num_workers: 4
  shuffle: true
  drop_last: true
  logger_freq: 5000
  resume_ckpt: null
  grad_clip_val: 0.5
  scheduler:
    name: onecycle
    interval: step
    onecycle:
      pct_start: 0.08
      div_factor: 25.0
      final_div_factor: 10000.0
      anneal_strategy: cos

val:
  batch_size: 32
  num_workers: 4
  shuffle: false
  drop_last: false
  max_items: null

test:
  batch_size: 1
  num_workers: 2
  shuffle: false
  drop_last: false
  threshold: 0.5
  max_items: null

wandb:
  project: "DFD_ablation"
  group: "ablation_study"
  save_code: true

experiment:
  root_dir: "experiments/ablation"
  name: "h_no_sbi"

model:
  backbone: "convnextv2_base"

checkpoint:
  monitor: "v/eer"
  mode: min
  save_top_k: 2
  save_last: true
  best_filename: "best-eer-epoch={epoch:02d}"
  every_filename: "epoch={epoch:02d}"