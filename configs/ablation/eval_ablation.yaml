# configs/ablation/eval_ablation.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# Ablation Study Evaluation Config
# Used by eval_ablation.py and scripts/eval_ablation.sh
#
# Evaluates all 9 ablation variants (a–h + full) on:
#   - Celeb-DF v2  (primary paper benchmark)
#   - DFD          (DeepFakeDetection)
#   - WildDeepfake (in-the-wild)
#   - DiffSwap     (diffusion-based)
#   - FF++ c23     (source domain)
#
# All variants were trained on FF++ c23. Eval is source-free on the others.
# Results are saved per-variant as CSV + a consolidated ablation table CSV.
# ═══════════════════════════════════════════════════════════════════════════════

seed: 3407
torch_home: ""
froze: false
ckpt_path: null

# ── Dataset configs (shared across all ablation variants) ──────────────────
dataset:
  name: "ffpp_rela"   # default name; eval script iterates over eval.datasets below

  ffpp_rela:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/ffpp"
    data_types: ""
    compressions: "c23"
    num_frames: 50
    methods: ["youtube", "Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]
    has_mask: false
    balance: true
    relation_data: false      # source-free eval: no identity pairs needed
    similarity: false
    similarity_path: null
    use_splits: true
    strict_splits: true
    splits_dirname: "splits"
    csv_dirname: "split_csv2"

  celeb_df:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/celebdf"
    num_frames: 50
    methods: "both"
    control: true
    alb: true
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/celebdf/split_csv2/celeb_df_v2_test.csv"
    strict_csv: false
    min_frames: 1
    mtcnn_suffix: "-mtcnn"
    image_size: 256
    skip_bad_images: true

  dfd:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/dfd"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/dfd/split_csv2/dfd_test.csv"
    num_frames: 50
    image_size: 256
    min_frames: 1
    mtcnn_suffix: "-mtcnn"
    strict_csv: false
    skip_bad_images: true
    methods: "both"
    eval_k_frames_per_video: 50
    eval_balance_classes: false
    eval_seed: 1234

  wild_deepfake:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/wild_deepfake"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/wild_deepfake/split_csv2/wilddeepfake_test.csv"
    image_size: 256
    strict_csv: false
    skip_bad_images: true
    methods: "both"

  diffswap:
    data_root: "/scratch/sahil/projects/img_deepfake/datasets/diffswap"
    split_csv: "/scratch/sahil/projects/img_deepfake/datasets/diffswap/split_csv2/diffswap_test.csv"
    image_size: 256
    strict_csv: false
    skip_bad_images: true
    methods: "both"

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std:  [0.5, 0.5, 0.5]
  aug:
    enable: false   # no augmentation during evaluation

model:
  backbone: "convnextv2_base"   # MUST match training config exactly

# ── Eval section ──────────────────────────────────────────────────────────
eval:
  model_config: "configs/diffusionfake.yaml"
  batch_size: 32
  num_workers: 4
  threshold: 0.5

  # Datasets to evaluate on (in this order)
  datasets:
    - celeb_df
    - dfd
    - wild_deepfake
    - diffswap
    - ffpp_rela

# ── Ablation variants: variant_id → experiment folder ─────────────────────
# eval_ablation.py reads this section to locate each variant's checkpoint.
# Paths are relative to project root unless absolute.
ablation_variants:
  a_backbone_linear:
    exp_dir: "experiments/ablation/a_backbone_linear"
    label: "(a) Backbone + linear head"

  b_diffusion_guidance:
    exp_dir: "experiments/ablation/b_diffusion_guidance"
    label: "(b) + Diffusion guidance†"

  c_dual_upsample_ff:
    exp_dir: "experiments/ablation/c_dual_upsample_featurefilters"
    label: "(c) + Dual upsample + FeatureFilters"

  d_global_head_smc:
    exp_dir: "experiments/ablation/d_global_head_smc"
    label: "(d) + GlobalHead + SMC"

  e_dimf:
    exp_dir: "experiments/ablation/e_dimf"
    label: "(e) + DIMF†"

  f_igs_igl_gap:
    exp_dir: "experiments/ablation/f_igs_igl_gap"
    label: "(f) + IGS (L_IGL + L_gap)†"

  g_no_dual_dropout:
    exp_dir: "experiments/ablation/g_no_dual_dropout"
    label: "(g) Full w/o dual-branch dropout"

  h_no_sbi:
    exp_dir: "experiments/ablation/h_no_sbi"
    label: "(h) Full w/o SBI augmentation"

  full_model:
    exp_dir: "experiments/ablation/full_model"
    label: "Full model (ours)"

# ── Output ─────────────────────────────────────────────────────────────────
ablation_eval_output:
  root_dir: "experiments/ablation/eval_results"
  # Per-variant CSV: <root_dir>/<variant_id>/<dataset>_preds.csv
  # Consolidated:    <root_dir>/ablation_table.csv
  # Metrics JSON:    <root_dir>/ablation_metrics.json

test:
  batch_size: 32
  num_workers: 4
  shuffle: false
  drop_last: false
  threshold: 0.5
  max_items: null